<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/ministy.jpg" type="image/jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mwri Promotion System</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function(acc, s) {
            var parts = s.split('=');
            acc[parts[0]] = parts.slice(1).join('=');
            return acc;
          }, {});
          if (decoded.p) {
            window.history.replaceState(
              null, null,
              l.pathname + decoded.p +
              (decoded.q ? '?' + decoded.q : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
